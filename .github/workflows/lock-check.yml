name: Dependency Lock Check

on:
  push:
    paths:
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"

jobs:
  lock-check:
    name: Verify uv.lock is up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check lock file is consistent
        run: |
          uv lock --check
          echo "uv.lock is up-to-date with pyproject.toml"
