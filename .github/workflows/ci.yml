name: CI

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master", "dev"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-scripts:
    name: Shell Script Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check scripts/*.sh syntax (bash -n)
        run: |
          echo "Running bash -n on scripts/*.sh ..."
          failed=0
          for f in scripts/*.sh; do
            bash -n "$f" && echo "  OK: $f" || { echo "  FAIL: $f"; failed=1; }
          done
          exit $failed
