name: CI

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master", "dev"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --extra dev --frozen

      - name: Run ruff lint
        run: uv run ruff check src/

      - name: Run ruff format check
        run: uv run ruff format --check src/

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --extra dev --frozen

      - name: Run mypy
        run: uv run mypy src/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # 类型检查失败不阻断 PR，但会产生警告

  syntax-check:
    name: Syntax & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install core dependencies (no torch/cv2 for speed)
        run: |
          uv pip install --system \
            loguru pyyaml numpy scipy scikit-learn tqdm rich

      - name: Syntax check all Python files
        run: |
          echo "Checking Python syntax in src/..."
          find src/ -name "*.py" | while read f; do
            python -m py_compile "$f" && echo "  OK: $f" || { echo "  FAIL: $f"; exit 1; }
          done
          echo "All files passed syntax check."
