name: CI

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master", "dev"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-scripts:
    name: Shell Script Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check scripts/*.sh syntax (bash -n)
        run: |
          echo "Running bash -n on scripts/*.sh ..."
          failed=0
          for f in scripts/*.sh; do
            bash -n "$f" && echo "  OK: $f" || { echo "  FAIL: $f"; failed=1; }
          done
          exit $failed

  dataset-url-reachability:
    name: Dataset Download URL Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify and probe download URLs in manage_data.sh
        run: |
          set +e
          for var in TID_SOURCE_URL KON_VIDEOS_SOURCE_URL KON_METADATA_SOURCE_URL T2V_SOURCE_URL; do
            url=$(grep -E "^${var}=" scripts/manage_data.sh | head -1 | sed -E 's/^[^"]*"([^"]+)".*/\1/')
            if [ -z "$url" ]; then
              echo "FAIL: ${var} not defined in manage_data.sh"
              exit 1
            fi
            echo "Defined: ${var}=${url}"
          done

          check_url() {
            local name="$1"
            local url="$2"
            local code
            code=$(curl --head --silent --location --max-time 25 \
              -o /dev/null -w "%{http_code}" "$url" 2>/dev/null)
            local rc=$?
            if [ "$rc" -eq 0 ] && [[ "$code" =~ ^(200|301|302|303|206)$ ]]; then
              echo "  OK: ${name} (HTTP ${code})"
            else
              echo "  WARNING: ${name} probe failed (curl_exit=${rc}, HTTP=${code})"
              echo "           ${url}"
              echo "           (May be geo/SSL restricted on GitHub runners; verify locally or on AutoDL)"
            fi
          }

          echo ""
          echo "Probing download endpoints..."
          check_url "TID2013" "http://www.ponomarenko.info/tid2013/tid2013.rar"
          check_url "KoNViD-1k videos" "https://datasets.vqa.mmsp-kn.de/archives/KoNViD_1k_videos.zip"
          check_url "KoNViD-1k metadata" "https://datasets.vqa.mmsp-kn.de/archives/KoNViD_1k_metadata.zip"

          gcode=$(curl --silent --location --max-time 25 \
            -o /dev/null -w "%{http_code}" \
            "https://drive.google.com/file/d/1aak5hgYsXock19d1rVufss3_X6eEA4Wx/view" 2>/dev/null)
          grc=$?
          if [ "$grc" -eq 0 ] && [[ "$gcode" =~ ^(200|301|302|303)$ ]]; then
            echo "  OK: T2VQA-DB Google Drive (HTTP ${gcode})"
          else
            echo "  WARNING: T2VQA-DB Google Drive probe failed (curl_exit=${grc}, HTTP=${gcode})"
          fi

          echo ""
          echo "URL probe finished (warnings do not fail CI)."

  dataset-extract-logic:
    name: Dataset Extract Logic Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zip/unzip
        run: sudo apt-get update -qq && sudo apt-get install -y zip unzip

      - name: Test smart_extract logic (mock ZIP)
        run: bash scripts/ci_test_smart_extract.sh
